name: Build Fabric Mod
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: ./gradlew build --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: LakshayVerifier-Client
          path: build/libs/*.jar
